name: Bundle Size Monitor

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  size-check:
    name: Check Bundle Size
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (PR)
        run: npm ci

      - name: Install dependencies (Base)
        run: npm ci
        working-directory: base

      - name: Build and measure Base branch
        run: node scripts/size-check.js --action build --repo base --out base-sizes.json

      - name: Build and measure PR branch
        run: node scripts/size-check.js --action build --repo . --out pr-sizes.json

      - name: Compare sizes and generate report
        id: compare
        run: node scripts/size-check.js --action compare --base base-sizes.json --pr pr-sizes.json --markdown size-report.md --threshold 50
        continue-on-error: true

      - name: Post or Update Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'size-report.md';
            if (!fs.existsSync(path)) {
              console.log('Size report markdown not found.');
              return;
            }
            const commentBody = fs.readFileSync(path, 'utf8');
            const { owner, repo, number } = context.issue;
            
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: number,
            });
            
            const existingComment = comments.data.find(c => c.body.includes('### 📊 Bundle Size Report'));
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: commentBody
              });
              console.log('Updated existing bundle size comment.');
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: number,
                body: commentBody
              });
              console.log('Created new bundle size comment.');
            }

      - name: Check compare status
        if: steps.compare.outcome == 'failure'
        run: |
          echo "❌ Bundle size check failed because the total bundle size exceeded the configured threshold."
          exit 1
